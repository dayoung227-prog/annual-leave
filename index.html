<style>

body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#f1f5f9;min-height:100vh;}

function sbFetch(path, method, body) {
  return fetch(SB_URL + '/rest/v1/' + path, {
    method: method || 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates' : ''

  }).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
    return r.text().then(function(t) { return t ? JSON.parse(t) : null; });

}

function getEmployees(year) { return sbFetch('employees?select=*&year=eq.'+year+'&order=name'); }

function normalizeDate(d) {
  if(d===null||d===undefined||d==='') return '';
  var str=String(d).trim(), num=Number(str);
  if(!isNaN(num)&&/^\d+$/.test(str)&&num>=30000&&num<=60000){
    var ms=(num-25569)*86400000, dt=new Date(ms);
    return dt.getUTCFullYear()+'-'+String(dt.getUTCMonth()+1).padStart(2,'0')+'-'+String(dt.getUTCDate()).padStart(2,'0');
  }
  var m=str.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
  if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  return str;
}
function calcPeriods(joinDate) {
  if(!joinDate) return {gen:'',use:''};
  var nd=normalizeDate(joinDate), m=nd.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return {gen:'',use:''};
  var yr=parseInt(m[1],10);
  var gs=yr>=2025?(m[1]+'. '+m[2]+'. '+m[3]):'2025. 01. 01';
  return {gen:gs+' ~ 2025. 12. 31', use:'2026. 01. 01 ~ 2026. 12. 31'};
}
function tl(v){ return v===1?'연차':v===0.5?'반차':'반반차'; }
function tc(v){ return v===1?'#3b82f6':v===0.5?'#8b5cf6':'#06b6d4'; }
function totalSel(sel){ var t=0; Object.values(sel||{}).forEach(function(v){ t=+(t+v).toFixed(2); }); return t; }

// ═══════════════════════
// 직원 화면
// ═══════════════════════
var HOLIDAYS=['2026-07-17','2026-08-17','2026-09-24','2026-09-25','2026-10-09','2026-10-05','2026-12-25'];
function isHoliday(ds){ return HOLIDAYS.indexOf(ds)!==-1; }

var CE=null, CS={}, SD=null, CY=2026, CM=6, PD=null, sigOk=false;

function renderAuth(){
  s('emp-body','<div class="card"><h3 style="margin-bottom:14px;font-size:15px;">본인 확인</h3>'+
    '<label class="lbl">이름</label><input type="text" id="i-name" placeholder="홍길동" onkeydown="if(event.key===\'Enter\')doAuth()"/>'+
    '<label class="lbl">사번</label><input type="text" id="i-sabun" placeholder="사번을 입력하세요" onkeydown="if(event.key===\'Enter\')doAuth()"/>'+
    '<div id="auth-err" class="err"></div>'+
    '<button class="btn btn-blue btn-block" style="margin-top:14px;" onclick="doAuth()">확인</button></div>');
}

function doAuth(){
  var name=(g('i-name')||{value:''}).value.trim();
  var sabun=(g('i-sabun')||{value:''}).value.trim();
  if(!name||!sabun){ s('auth-err','이름과 사번을 입력해주세요.'); return; }
  s('auth-err','확인 중...');
  sbFetch('employees?sabun=eq.'+encodeURIComponent(sabun)+'&name=eq.'+encodeURIComponent(name)+'&select=*&order=year.desc').then(function(rows){
    if(!rows||rows.length===0){ s('auth-err','이름 또는 사번이 일치하지 않습니다.'); return; }
    CE=rows[0]; CS={}; SD=null; CY=parseInt(CE.year)||2026; CM=6; sigOk=false;
    return getSubmission(sabun,CE.year).then(function(subs){
      if(subs&&subs.length>0&&subs[0].submitted_at){ renderAlready(); return; }
      renderLeave();
    });
  }).catch(function(e){ s('auth-err','오류: '+e.message); });
}

    '<p style="color:#6b7280;font-size:13px;margin-top:8px;">인사팀에서 확인 중입니다.<br/>문의사항은 인사팀으로 연락해주세요.</p>'+
    '<button class="btn btn-blue" style="margin-top:12px;" onclick="goHome()">홈으로</button></div>');
}

function infoCard(){
  var e=CE, p=calcPeriods(e.join_date);
  var rows=[['이름',e.name],['부서',e.dept||'-'],['직급',e.rank||'-'],['입사일',e.join_date||'-'],
    ['발생연차',(e.generated||0)+'일'],['사용연차',(e.used_existing||0)+'일'],['잔여연차',(e.remaining||0)+'일']];
  var cells=rows.map(function(r){ return '<div class="cell"><span>'+r[0]+'</span><b>'+r[1]+'</b></div>'; }).join('');
  var pt=p.gen?'<table><tr><th class="pth">연차휴가 발생대상 기간</th><th class="pth">연차휴가 사용대상 기간</th></tr>'+
    '<tr><td class="ptd">'+p.gen+'</td><td class="ptd">'+p.use+'</td></tr></table>':'';
  return '<div class="card" style="background:#fde8ef;border-left:4px solid #D7005A;padding:16px;">'+
    '<div class="grid2" style="margin-bottom:10px;">'+cells+'</div>'+pt+'</div>';
}

function noticeCard(){
  var e=CE, yr=CE.year||'2026', deadline=yr+'. 7. 10';
  return '<div class="notice"><p><b>'+e.name+'</b> 님의 통지일 현재 사용가능한 미사용 연차유급휴가일수는 <b style="color:#dc2626;">'+e.remaining+'일</b>임을 알려드립니다.</p>'+

    '<p style="margin-top:8px;">동 기한 내에 제출되지 아니한 경우 관련 규정에 의해 추후 회사가 임의 지정할 예정이며, 그럼에도 불구하고 사용하지 아니한 연차유급휴가일수에 대하여는 향후 <b>연차유급휴가수당이 지급되지 않음</b>을 알려드리니 유념하시기 바랍니다.</p>'+
    '<div class="law"><b>[근로기준법 제61조 연차 유급휴가의 사용 촉진]</b><br/>'+
    '사용자가 제60조제1항·제3항 및 제4항에 따른 유급휴가의 사용을 촉진하기 위하여 다음 각 호의 조치를 하였음에도 불구하고 근로자가 휴가를 사용하지 아니하여 제60조제7항 본문에 따라 소멸된 경우에는 사용자는 그 사용하지 아니한 휴가에 대하여 보상할 의무가 없고, 제60조제7항 단서에 따른 사용자의 귀책사유에 해당하지 아니하는 것으로 본다.<br/><br/>'+
    '1. 제60조제7항 본문에 따른 기간이 끝나기 6개월 전을 기준으로 10일 이내에 사용자가 근로자별로 사용하지 아니한 휴가 일수를 알려주고, 근로자가 그 사용 시기를 정하여 사용자에게 통보하도록 서면으로 촉구할 것<br/><br/>'+
    '2. 제1호에 따른 촉구에도 불구하고 근로자가 촉구를 받은 때부터 10일 이내에 사용하지 아니한 휴가의 전부 또는 일부의 사용 시기를 정하여 사용자에게 통보하지 아니하면 제60조제7항 본문에 따른 기간이 끝나기 2개월 전까지 사용자가 사용하지 아니한 휴가의 사용 시기를 정하여 근로자에게 서면으로 통보할 것</div></div>';
}

function renderLeave(){
  var used=totalSel(CS), left=+((Number(CE.remaining)||0)-used).toFixed(2);
  var yr=parseInt(CE.year)||2026;
  s('emp-body',infoCard()+noticeCard()+

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'+
    '<h3 style="font-size:14px;">연차 날짜 선택</h3>'+

    '<button class="nav-btn" onclick="moveM(1)">▶</button></div>'+
    '<div id="cal-grid" class="cal-grid"></div>'+
    '<div class="legend">'+
    '<span style="font-size:11px;display:flex;align-items:center;gap:3px;"><span class="ldot" style="background:#3b82f6;"></span>연차(1일)</span>'+
    '<span style="font-size:11px;display:flex;align-items:center;gap:3px;"><span class="ldot" style="background:#8b5cf6;"></span>반차(0.5일)</span>'+
    '<span style="font-size:11px;display:flex;align-items:center;gap:3px;"><span class="ldot" style="background:#06b6d4;"></span>반반차(0.25일)</span>'+

function goSignCheck(){
  var used=totalSel(CS), left=+((Number(CE.remaining)||0)-used).toFixed(2);
  if(left>0.001){
    alert('⚠️ 아직 지정하지 않은 연차가 '+left+'일 남아있습니다.\n잔여 연차를 모두 사용 지정해야 다음 단계로 진행할 수 있습니다.');
    return;
  }
  renderSign();
}

function drawCal(){
  var t=g('cal-title'); if(t) t.textContent=CY+'년 '+(CM+1)+'월';
  var gr=g('cal-grid'); if(!gr) return;
  var dows=['일','월','화','수','목','금','토'];
  var h=dows.map(function(d,i){ return '<div class="dow" style="color:'+(i===0?'#ef4444':i===6?'#3b82f6':'#6b7280')+';">'+d+'</div>'; }).join('');
  var first=new Date(CY,CM,1).getDay(), days=new Date(CY,CM+1,0).getDate();
  for(var i=0;i<first;i++) h+='<div></div>';
  for(var d=1;d<=days;d++){
    var dow=new Date(CY,CM,d).getDay(), wk=dow===0||dow===6;
    var ds=CY+'-'+String(CM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var holiday=isHoliday(ds), disabled=wk||holiday;
    var v=CS[ds];
    var tag=v?'<span class="day-tag" style="background:'+tc(v)+';">'+tl(v)+'</span>':'';

function openPop(ds,e){

    return '<button onclick="pickL('+v+')" style="background:'+(cur===v?'#3b82f6':'#f3f4f6')+';color:'+(cur===v?'#fff':'#374151')+';">'+tl(v)+' ('+v+'일)</button>';

  pop.style.cssText='left:'+Math.min(r.left,window.innerWidth-160)+'px;top:'+(r.bottom+4)+'px;';

function pickL(v){
  closePop(); if(!PD) return;
  var cur=CS[PD]||0;
  if(v===0){ delete CS[PD]; }
  else{
    var diff=v-cur, left=+((Number(CE.remaining)||0)-totalSel(CS)).toFixed(2);
    if(diff>left+0.001){ alert('잔여 연차가 부족합니다.'); return; }

}

function initSig(){
  var c=g('sig-c'); if(!c) return; SD=null; sigOk=false;
  var ctx=c.getContext('2d'), drawing=false;
  function pos(e){ var r=c.getBoundingClientRect(),src=e.touches?e.touches[0]:e; return [src.clientX-r.left,src.clientY-r.top]; }
  c.onmousedown=c.ontouchstart=function(e){ e.preventDefault(); drawing=true; var p=pos(e); ctx.beginPath(); ctx.moveTo(p[0],p[1]); };
  c.onmousemove=c.ontouchmove=function(e){ e.preventDefault(); if(!drawing)return; var p=pos(e); ctx.lineWidth=2; ctx.strokeStyle='#000'; ctx.lineCap='round'; ctx.lineTo(p[0],p[1]); ctx.stroke(); };
  c.onmouseup=c.onmouseleave=c.ontouchend=function(e){ e.preventDefault(); drawing=false; SD=c.toDataURL(); sigOk=true; };
}
function clearSig(){ var c=g('sig-c'); if(!c) return; c.getContext('2d').clearRect(0,0,c.width,c.height); SD=null; sigOk=false; }

function renderUpload(){
  adminTab='upload';
  getEmployees(adminYear).then(function(emps){
    emps=emps||[];
    var tbl=emps.length?('<p style="font-size:12px;margin:12px 0 6px;">'+adminYear+'년 등록: <b>'+emps.length+'명</b></p>'+
      '<div style="overflow-x:auto;"><table><tr>'+
      ['사번','이름','부서','직급','입사일자','발생연차','사용연차','잔여연차'].map(function(h){ return '<th>'+h+'</th>'; }).join('')+'</tr>'+
      emps.map(function(e){ return '<tr>'+
        [e.sabun,e.name,e.dept,e.rank,e.join_date,e.generated,e.used_existing,e.remaining]
        .map(function(v){ return '<td>'+(v!==undefined?v:'')+'</td>'; }).join('')+'</tr>'; }).join('')+
      '</table></div>'):'';
    s('admin-body',tabBar()+
      '<div class="card"><h3 style="margin-bottom:8px;font-size:14px;">📤 '+adminYear+'년 직원 엑셀 업로드</h3>'+
      '<p style="font-size:12px;color:#6b7280;margin-bottom:4px;">컬럼: <b>사번 / 이름 / 부서 / 직급 / 입사일자 / 발생연차 / 사용연차 / 잔여연차</b></p>'+
      '<input type="file" accept=".xlsx,.xls,.csv" onchange="handleUpload(this)" style="font-size:13px;margin:4px 0 8px;"/>'+
      '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #e5e7eb;">'+
      '<p style="font-size:12px;color:#6b7280;margin-bottom:6px;">⚠️ <b>'+adminYear+'년</b> 직원 목록과 제출 데이터를 초기화합니다.</p>'+
      '<button class="btn btn-red" style="font-size:13px;padding:7px 16px;" onclick="resetAll()">🗑️ '+adminYear+'년 데이터 초기화</button></div>'+
      tbl+'</div>');
  });
}

function resetAll(){
  if(!confirm(adminYear+'년 직원 목록과 제출 데이터가 모두 삭제됩니다.\n정말 초기화하시겠습니까?')) return;
  s('admin-body',tabBar()+'<div class="loading">초기화 중...</div>');
  Promise.all([deleteEmployeesByYear(adminYear),deleteSubmissionsByYear(adminYear)]).then(function(){
    alert(adminYear+'년 초기화 완료!'); renderUpload();
  }).catch(function(e){ alert('오류: '+e.message); });
}

function handleUpload(input){
  var file=input.files[0]; if(!file) return;
  if(file.name.toLowerCase().endsWith('.csv')){
    var r=new FileReader();
    r.onload=function(ev){ applyRows(parseCSV(ev.target.result)); };
    r.readAsText(file,'utf-8'); return;
  }
  var r=new FileReader();
  r.onload=function(ev){
    var data=new Uint8Array(ev.target.result);
    function go(){
      var wb=window.XLSX.read(data,{type:'array'});
      applyRows(window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}));
    }
    if(window.XLSX){ go(); return; }
    var sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    sc.onload=go; sc.onerror=function(){ alert('CSV로 저장 후 다시 시도해주세요.'); };
    document.head.appendChild(sc);
  };
  r.readAsArrayBuffer(file);
}
function parseCSV(text){
  var lines=text.split(/\r?\n/).filter(function(l){ return l.trim(); });
  var headers=lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,''); });
  return lines.slice(1).map(function(l){
    var cols=l.split(',').map(function(c){ return c.trim().replace(/^"|"$/g,''); });
    var o={}; headers.forEach(function(h,i){ o[h]=cols[i]||''; }); return o;
  });
}
function applyRows(rows){
  var emps=rows.map(function(r){
    var n={};
    Object.keys(r).forEach(function(k){ n[k.trim()]=String(r[k]||'').trim(); });
    return {
      sabun:n['사번']||'', name:n['이름']||'', dept:n['부서']||'', rank:n['직급']||'',
      join_date:normalizeDate(n['입사일자']||n['입사일']||''),
      generated:Number(n['발생연차'])||0,
      used_existing:Number(n['사용연차'])||0,
      remaining:Number(n['잔여연차'])||0,
      year:adminYear
    };
  }).filter(function(e){ return e.sabun&&e.name; });
  if(!emps.length){ alert('데이터가 없습니다. 컬럼명을 확인해주세요.'); return; }
  s('admin-body',tabBar()+'<div class="loading">업로드 중...</div>');
  upsertEmployees(emps).then(function(){
    alert(emps.length+'명 업로드 완료! ('+adminYear+'년)');
    renderUpload();
  }).catch(function(e){ alert('업로드 오류: '+e.message); });
}
