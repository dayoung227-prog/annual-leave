<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>연차촉진 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f3f4f6;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
h2{font-size:18px;font-weight:700;margin-bottom:16px;color:#111}
h3{font-size:15px;font-weight:600;color:#111}
.field{margin-bottom:12px}
label{display:block;font-size:13px;color:#6b7280;margin-bottom:4px}
input[type=text],input[type=password]{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-blue{background:#2563eb;color:#fff}
.btn-blue:hover{background:#1d4ed8}
.btn-red{background:#ef4444;color:#fff}
.btn-gray{background:#e5e7eb;color:#374151}
.btn-sm{padding:6px 12px;font-size:13px;border:none;border-radius:6px;cursor:pointer;background:#e5e7eb;color:#374151}
.btn-block{display:block;width:100%}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:14px}
.info-row:last-child{border-bottom:none}
.info-label{color:#6b7280}
.info-value{font-weight:600;color:#111}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600}
.badge-green{background:#d1fae5;color:#065f46}
.badge-yellow{background:#fef9c3;color:#854d0e}
.badge-gray{background:#f3f4f6;color:#6b7280}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.cal-head{text-align:center;font-size:11px;font-weight:600;color:#6b7280;padding:4px 0}
.cal-day{text-align:center;padding:6px 2px;border-radius:6px;font-size:13px;cursor:pointer;position:relative;user-select:none}
.cal-day.today{font-weight:700;color:#2563eb}
.cal-day.disabled{color:#d1d5db;cursor:default}
.cal-day.weekend{color:#ef4444}
.cal-day.holiday{color:#ef4444}
.cal-day.selected-1{background:#dbeafe}
.cal-day.selected-05{background:#ede9fe}
.cal-day.selected-025{background:#fce7f3}
.cal-day .sel-label{font-size:9px;display:block;color:#2563eb;font-weight:700}
.remain-bar{background:#f3f4f6;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.remain-bar span{font-size:13px;color:#6b7280}
.remain-bar strong{font-size:16px;color:#2563eb}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.month-nav button{background:none;border:1px solid #d1d5db;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:14px}
.month-nav span{font-size:15px;font-weight:600}
.type-sel{display:flex;gap:6px;margin-top:6px}
.type-sel button{flex:1;padding:6px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;cursor:pointer;background:#fff}
.type-sel button.active{background:#2563eb;color:#fff;border-color:#2563eb}
.sig-canvas{border:1.5px solid #d1d5db;border-radius:8px;width:100%;height:120px;touch-action:none;display:block;background:#fafafa}
.agree-row{display:flex;align-items:flex-start;gap:8px;margin:12px 0;background:#f0fdf4;border-radius:8px;padding:10px 12px}
.agree-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;flex-shrink:0;margin-top:2px}
.agree-row label{font-size:13px;color:#374151;line-height:1.5;cursor:pointer}
.popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.popup{background:#fff;border-radius:12px;padding:24px;max-width:360px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.sel-summary{background:#f8fafc;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;line-height:1.8}
/* 관리자 */
.table-wrap{overflow-x:auto;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f3f4f6;padding:8px 6px;text-align:center;border-bottom:2px solid #e5e7eb;white-space:nowrap}
td{padding:8px 6px;text-align:center;border-bottom:1px solid #f3f4f6;white-space:nowrap}
tr:hover td{background:#f8fafc}
.err{color:#ef4444;font-size:13px;margin-top:6px}
.tab-bar{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;background:#e5e7eb;color:#374151}
.tab.active{background:#2563eb;color:#fff}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ★ Supabase 설정 (본인 값으로 교체)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PW = "admin1234";

// ─── 공휴일 (2025년 기준, 필요시 추가) ───
const HOLIDAYS = new Set([
  "2025-01-01","2025-01-28","2025-01-29","2025-01-30",
  "2025-03-01","2025-05-05","2025-05-06","2025-06-06",
  "2025-08-15","2025-10-03","2025-10-06","2025-10-07","2025-10-08","2025-10-09",
  "2025-12-25"
]);

let empData = null;   // 현재 직원 데이터
let selections = {};  // { "2025-06-20": 1, "2025-06-21": 0.5, ... }
let signatureData = null;

function g(id){ return document.getElementById(id); }
function s(id,html){ const el=g(id); if(el) el.innerHTML=html; }
function app(html){ document.getElementById('app').innerHTML=html; }

// ━━━ 메인 화면 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderHome(){
  empData=null; selections={}; signatureData=null;
  app(`
    <div class="card" style="margin-top:24px;text-align:center;">
      <div style="font-size:36px;margin-bottom:8px;">📅</div>
      <h2 style="margin-bottom:4px;">연차 사용 촉진</h2>
      <p style="color:#6b7280;font-size:14px;margin-bottom:20px;">본인인증 후 연차 일정을 입력해주세요</p>
      <div class="field"><label>이름</label><input type="text" id="inp-name" placeholder="홍길동"/></div>
      <div class="field"><label>주민등록번호</label><input type="text" id="inp-rrn" placeholder="000000-0000000" maxlength="14"/></div>
      <div class="err" id="login-err"></div>
      <button class="btn btn-blue" onclick="doLogin()">확인</button>
      <hr style="margin:20px 0;border-color:#f3f4f6"/>
      <button class="btn btn-gray" style="font-size:13px;" onclick="renderAdminLogin()">관리자 로그인</button>
    </div>
  `);
  const rrn=g('inp-rrn');
  rrn.addEventListener('input',function(){
    let v=this.value.replace(/\D/g,'');
    if(v.length>6) v=v.slice(0,6)+'-'+v.slice(6,13);
    this.value=v;
  });
}

async function doLogin(){
  const name=g('inp-name').value.trim();
  const rrn=g('inp-rrn').value.replace(/-/g,'');
  if(!name||rrn.length<13){ s('login-err','이름과 주민번호(13자리)를 모두 입력해주세요.'); return; }
  const {data,error}=await sb.from('employees').select('*').eq('name',name).eq('rrn',rrn).single();
  if(error||!data){ s('login-err','일치하는 정보가 없습니다. 인사팀에 문의해주세요.'); return; }
  empData=data;
  // 이미 제출했는지 확인
  const {data:sub}=await sb.from('submissions').select('submitted_at').eq('sabun',data.sabun).single();
  if(sub){ renderDone(sub.submitted_at); return; }
  selections={};
  renderInfo();
}

// ━━━ 직원 정보 확인 ━━━━━━━━━━━━━━━━━━━━━━━━
function renderInfo(){
  app(`
    <div class="card">
      <h2>📋 연차 정보 확인</h2>
      <div class="info-row"><span class="info-label">이름</span><span class="info-value">${empData.name}</span></div>
      <div class="info-row"><span class="info-label">부서</span><span class="info-value">${empData.dept||'-'}</span></div>
      <div class="info-row"><span class="info-label">직급</span><span class="info-value">${empData.rank||'-'}</span></div>
      <div class="info-row"><span class="info-label">입사일</span><span class="info-value">${empData.join_date||'-'}</span></div>
      <div class="info-row"><span class="info-label">발생 연차</span><span class="info-value">${empData.generated}일</span></div>
      <div class="info-row"><span class="info-label">기사용 연차</span><span class="info-value">${empData.used_existing}일</span></div>
      <div class="info-row"><span class="info-label">잔여 연차</span><span class="info-value" style="color:#2563eb;">${empData.remaining}일</span></div>
      <button class="btn btn-blue" style="margin-top:16px;" onclick="renderLeave()">연차 일정 입력 →</button>
    </div>
  `);
}

// ━━━ 달력 (연차 선택) ━━━━━━━━━━━━━━━━━━━━━━
let calYear, calMonth;
function renderLeave(){
  const now=new Date();
  if(!calYear){ calYear=now.getFullYear(); calMonth=now.getMonth(); }
  const totalSel=Object.values(selections).reduce((a,b)=>a+b,0);
  const remain=+(empData.remaining-totalSel).toFixed(2);

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const lastDate=new Date(calYear,calMonth+1,0).getDate();
  const days=['일','월','화','수','목','금','토'];

  let cells='';
  for(let i=0;i<firstDay;i++) cells+='<div></div>';
  for(let d=1;d<=lastDate;d++){
    const dt=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(calYear,calMonth,d).getDay();
    const isWeekend=dow===0||dow===6;
    const isHol=HOLIDAYS.has(dt);
    const isPast=new Date(dt)<new Date(now.toDateString());
    let cls='cal-day';
    if(isWeekend||isHol) cls+=' weekend';
    if(isPast||isWeekend||isHol) cls+=' disabled';
    const sel=selections[dt];
    if(sel===1) cls+=' selected-1';
    else if(sel===0.5) cls+=' selected-05';
    else if(sel===0.25) cls+=' selected-025';
    const label=sel?`<span class="sel-label">${sel===1?'1일':sel===0.5?'0.5':''}</span>`:'';
    const onclick=(isPast||isWeekend||isHol)?'':'onclick="clickDay(\''+dt+'\')"';
    cells+=`<div class="${cls}" ${onclick}>${d}${label}</div>`;
  }

  app(`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <h2 style="margin:0;">📅 연차 일정 선택</h2>
        <button class="btn-sm" onclick="renderInfo()">← 정보</button>
      </div>
      <div class="remain-bar">
        <span>남은 연차</span>
        <strong id="remain-disp">${remain}일</strong>
      </div>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">◀</button>
        <span>${calYear}년 ${calMonth+1}월</span>
        <button onclick="changeMonth(1)">▶</button>
      </div>
      <div class="cal-grid">
        ${days.map(d=>`<div class="cal-head" style="${d==='일'?'color:#ef4444':d==='토'?'color:#3b82f6':''}">${d}</div>`).join('')}
        ${cells}
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;font-size:12px;">
        <span style="background:#dbeafe;padding:2px 8px;border-radius:4px;">■ 1일</span>
        <span style="background:#ede9fe;padding:2px 8px;border-radius:4px;">■ 0.5일</span>
        <span style="background:#fce7f3;padding:2px 8px;border-radius:4px;">■ 0.25일</span>
      </div>
      <div class="sel-summary" id="sel-summary" style="margin-top:12px;">선택된 날짜가 없습니다.</div>
      <button class="btn btn-blue" onclick="goSign()" style="margin-top:4px;">서명하기 →</button>
    </div>
  `);
  updateSummary();
}

function changeMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderLeave();
}

// 날짜 클릭 → 팝업
function clickDay(dt){
  const cur=selections[dt]||0;
  const totalSel=Object.values(selections).reduce((a,b)=>a+b,0);
  const remain=+(empData.remaining-totalSel).toFixed(2);
  const avail=cur>0?+(remain+cur).toFixed(2):remain;

  const opts=[
    {v:0,label:'선택 안 함'},
    {v:1,label:'1일'},
    {v:0.5,label:'0.5일 (반차)'},
    {v:0.25,label:'0.25일 (반반차)'},
  ].filter(o=>o.v===0||o.v<=avail||o.v===cur);

  const btns=opts.map(o=>`
    <button class="btn ${o.v===cur?'btn-blue':'btn-gray'}" style="margin-top:8px;"
      onclick="setDay('${dt}',${o.v})">${o.label}</button>
  `).join('');

  document.getElementById('app').insertAdjacentHTML('beforeend',`
    <div class="popup-bg" id="day-popup" onclick="if(event.target===this)closePopup()">
      <div class="popup">
        <h3 style="margin-bottom:8px;">${dt}</h3>
        <p style="font-size:13px;color:#6b7280;margin-bottom:4px;">사용 연차 선택</p>
        <p style="font-size:13px;">사용 가능: <strong>${avail}일</strong></p>
        ${btns}
        <button class="btn btn-gray" style="margin-top:12px;" onclick="closePopup()">취소</button>
      </div>
    </div>
  `);
}

function setDay(dt,v){
  if(v===0) delete selections[dt];
  else selections[dt]=v;
  closePopup();
  renderLeave();
}
function closePopup(){ const p=g('day-popup'); if(p) p.remove(); }

function updateSummary(){
  const keys=Object.keys(selections).sort();
  if(!keys.length){ s('sel-summary','선택된 날짜가 없습니다.'); return; }
  const total=Object.values(selections).reduce((a,b)=>a+b,0);
  let rows=keys.map(k=>`${k} (${selections[k]}일)`).join(' / ');
  s('sel-summary',`<strong>선택 합계: ${total}일</strong><br/><span style="color:#6b7280;font-size:12px;">${rows}</span>`);
}

function goSign(){
  const total=Object.values(selections).reduce((a,b)=>a+b,0);
  if(total===0){ alert('연차 날짜를 1개 이상 선택해주세요.'); return; }
  renderSign();
}

// ━━━ 서명 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderSign(){
  const total=Object.values(selections).reduce((a,b)=>a+b,0);
  app(`
    <div class="card">
      <button class="btn-sm" style="margin-bottom:12px;" onclick="renderLeave()">← 날짜 수정</button>
      <h3 style="margin-bottom:8px;">✍️ 서명</h3>
      <p style="font-size:13px;color:#6b7280;margin-bottom:4px;">선택하신 연차: <strong>${total}일</strong></p>
      <p style="font-size:13px;color:#6b7280;margin-bottom:12px;">아래 박스에 마우스(또는 손가락)로 서명해주세요.</p>
      <canvas id="sig-c" class="sig-canvas" width="440" height="120"></canvas>
      <button class="btn-sm" style="margin-top:6px;" onclick="clearSig()">지우기</button>

      <!-- ★ 서명 동의 체크박스 -->
      <div class="agree-row" style="margin-top:14px;">
        <input type="checkbox" id="agree-check"/>
        <label for="agree-check">
          본인은 위와 같이 연차 사용 일정을 확인하였으며,<br/>
          전자 서명에 동의합니다.
        </label>
      </div>

      <button class="btn btn-blue btn-block" style="margin-top:12px;" onclick="goConfirm()">완료 →</button>
    </div>
  `);
  initSig();
}

let _sigDrawing=false;
function initSig(){
  const c=g('sig-c'); if(!c) return;
  signatureData=null;
  const ctx=c.getContext('2d');
  function pos(e){
    const r=c.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return [src.clientX-r.left, src.clientY-r.top];
  }
  c.onmousedown=c.ontouchstart=function(e){e.preventDefault();_sigDrawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p[0],p[1]);};
  c.onmousemove=c.ontouchmove=function(e){e.preventDefault();if(!_sigDrawing)return;const p=pos(e);ctx.lineWidth=2;ctx.strokeStyle='#000';ctx.lineCap='round';ctx.lineTo(p[0],p[1]);ctx.stroke();};
  c.onmouseup=c.onmouseleave=c.ontouchend=function(e){e.preventDefault();_sigDrawing=false;signatureData=c.toDataURL();};
}
function clearSig(){
  const c=g('sig-c'); if(!c) return;
  c.getContext('2d').clearRect(0,0,c.width,c.height);
  signatureData=null;
}

function goConfirm(){
  const chk=g('agree-check');
  if(!chk||!chk.checked){ alert('전자서명 동의 체크박스를 확인해주세요.'); return; }
  if(!signatureData){ alert('서명을 먼저 해주세요.'); return; }
  renderConfirm();
}

// ━━━ 최종 확인 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderConfirm(){
  const total=Object.values(selections).reduce((a,b)=>a+b,0);
  const keys=Object.keys(selections).sort();
  const rows=keys.map(k=>`<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${selections[k]}일</span></div>`).join('');
  app(`
    <div class="card">
      <h2>✅ 최종 확인</h2>
      <div class="info-row"><span class="info-label">이름</span><span class="info-value">${empData.name}</span></div>
      <div class="info-row"><span class="info-label">부서</span><span class="info-value">${empData.dept}</span></div>
      ${rows}
      <div class="info-row"><span class="info-label">합계</span><span class="info-value" style="color:#2563eb;">${total}일</span></div>
      <div style="margin:12px 0;">
        <p style="font-size:12px;color:#6b7280;margin-bottom:4px;">서명</p>
        <img src="${signatureData}" style="border:1px solid #e5e7eb;border-radius:6px;width:100%;max-height:80px;object-fit:contain;"/>
      </div>
      <button class="btn btn-blue" onclick="doSubmit()">제출하기</button>
      <button class="btn btn-gray" style="margin-top:8px;" onclick="renderSign()">← 서명 다시</button>
    </div>
  `);
}

async function doSubmit(){
  const total=Object.values(selections).reduce((a,b)=>a+b,0);
  const {error}=await sb.from('submissions').upsert({
    sabun: empData.sabun,
    name: empData.name,
    dept: empData.dept,
    rank: empData.rank,
    join_date: empData.join_date,
    generated: empData.generated,
    used_existing: empData.used_existing,
    remaining: empData.remaining,
    selections: selections,
    total_selected: total,
    signature: signatureData,
    submitted_at: new Date().toISOString()
  });
  if(error){ alert('제출 중 오류가 발생했습니다. 인사팀에 문의해주세요.\n'+error.message); return; }
  renderDone(new Date().toISOString());
}

function renderDone(submittedAt){
  const dt=new Date(submittedAt).toLocaleString('ko-KR');
  app(`
    <div class="card" style="text-align:center;margin-top:40px;">
      <div style="font-size:48px;margin-bottom:12px;">🎉</div>
      <h2>제출 완료!</h2>
      <p style="color:#6b7280;font-size:14px;margin-top:8px;">연차 촉진 신청이 완료되었습니다.<br/>제출일시: ${dt}</p>
      <p style="color:#6b7280;font-size:13px;margin-top:12px;">문의: 인사팀</p>
    </div>
  `);
}

// ━━━ 관리자 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderAdminLogin(){
  app(`
    <div class="card" style="margin-top:40px;">
      <h2>🔐 관리자 로그인</h2>
      <div class="field"><label>비밀번호</label><input type="password" id="adm-pw" placeholder="관리자 비밀번호"/></div>
      <div class="err" id="adm-err"></div>
      <button class="btn btn-blue" onclick="doAdminLogin()">로그인</button>
      <button class="btn btn-gray" style="margin-top:8px;" onclick="renderHome()">← 돌아가기</button>
    </div>
  `);
}
function doAdminLogin(){
  if(g('adm-pw').value!==ADMIN_PW){ s('adm-err','비밀번호가 틀렸습니다.'); return; }
  renderAdmin('status');
}

async function renderAdmin(tab){
  app(`<div style="padding-top:8px;"><div class="tab-bar"><button class="tab ${tab==='status'?'active':''}" onclick="renderAdmin('status')">진행 현황</button><button class="tab ${tab==='upload'?'active':''}" onclick="renderAdmin('upload')">직원 업로드</button></div><div id="adm-body">로딩 중...</div></div>`);

  if(tab==='status'){
    const [{data:emps},{data:subs}]=await Promise.all([
      sb.from('employees').select('*').order('dept'),
      sb.from('submissions').select('*')
    ]);
    const subMap={};
    (subs||[]).forEach(s=>subMap[s.sabun]=s);
    const done=(subs||[]).length;
    const total=(emps||[]).length;

    let rows=(emps||[]).map(e=>{
      const sub=subMap[e.sabun];
      const badge=sub
        ?`<span class="badge badge-green">완료</span>`
        :`<span class="badge badge-yellow">미완료</span>`;
      const dt=sub?new Date(sub.submitted_at).toLocaleDateString('ko-KR'):'-';
      const sel=sub?sub.total_selected+'일':'-';
      return `<tr>
        <td>${e.dept||'-'}</td>
        <td>${e.name}</td>
        <td>${e.remaining}일</td>
        <td>${sel}</td>
        <td>${badge}</td>
        <td>${dt}</td>
        <td>${sub?`<button class="btn-sm" onclick="viewSub('${e.sabun}')">보기</button>`:''}</td>
      </tr>`;
    }).join('');

    s('adm-body',`
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <span style="font-size:14px;color:#6b7280;">완료 <strong>${done}</strong> / 전체 <strong>${total}</strong>명</span>
          <button class="btn-sm btn-blue" onclick="renderHome()">로그아웃</button>
        </div>
        <div class="table-wrap">
          <table><thead><tr><th>부서</th><th>이름</th><th>잔여</th><th>선택</th><th>상태</th><th>제출일</th><th></th></tr></thead>
          <tbody>${rows||'<tr><td colspan=7>직원 없음</td></tr>'}</tbody></table>
        </div>
      </div>
    `);
  } else {
    s('adm-body',`
      <div class="card">
        <h3 style="margin-bottom:8px;">엑셀 업로드</h3>
        <p style="font-size:13px;color:#6b7280;margin-bottom:12px;">
          컬럼 순서: 사번 / 이름 / 부서 / 직급 / 입사일 / 주민번호 / 발생연차 / 기사용연차 / 잔여연차
        </p>
        <input type="file" id="xl-file" accept=".xlsx,.xls" style="margin-bottom:12px;"/>
        <button class="btn btn-blue" onclick="doUpload()">업로드</button>
        <div id="upload-result" style="margin-top:12px;font-size:13px;"></div>
      </div>
    `);
  }
}

async function doUpload(){
  const file=g('xl-file').files[0];
  if(!file){ alert('파일을 선택해주세요.'); return; }
  const XLSX=window.XLSX_LIB;
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  const data=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r[0]&&!r[1]) continue;
    data.push({
      sabun:String(r[0]).trim(),
      name:String(r[1]).trim(),
      dept:String(r[2]).trim(),
      rank:String(r[3]).trim(),
      join_date:String(r[4]).trim(),
      rrn:String(r[5]).replace(/-/g,'').trim(),
      generated:Number(r[6])||0,
      used_existing:Number(r[7])||0,
      remaining:Number(r[8])||0
    });
  }
  if(!data.length){ s('upload-result','<span style="color:#ef4444">데이터가 없습니다.</span>'); return; }
  const {error}=await sb.from('employees').upsert(data,{onConflict:'sabun'});
  if(error){ s('upload-result',`<span style="color:#ef4444">오류: ${error.message}</span>`); return; }
  s('upload-result',`<span style="color:#16a34a">✅ ${data.length}명 업로드 완료!</span>`);
}

async function viewSub(sabun){
  const {data}=await sb.from('submissions').select('*').eq('sabun',sabun).single();
  if(!data){ alert('데이터 없음'); return; }
  const sels=data.selections||{};
  const keys=Object.keys(sels).sort();
  const rows=keys.map(k=>`<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${sels[k]}일</span></div>`).join('');
  document.getElementById('app').insertAdjacentHTML('beforeend',`
    <div class="popup-bg" id="sub-popup" onclick="if(event.target===this)g('sub-popup').remove()">
      <div class="popup" style="max-height:80vh;overflow-y:auto;">
        <h3 style="margin-bottom:12px;">${data.name} 제출 내용</h3>
        ${rows}
        <div class="info-row"><span class="info-label">합계</span><span class="info-value">${data.total_selected}일</span></div>
        <p style="font-size:12px;color:#6b7280;margin:8px 0;">서명</p>
        <img src="${data.signature}" style="width:100%;border:1px solid #e5e7eb;border-radius:6px;"/>
        <button class="btn btn-gray" style="margin-top:12px;" onclick="g('sub-popup').remove()">닫기</button>
      </div>
    </div>
  `);
}

// XLSX 라이브러리 동적 로드

xlScript.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.full.min.js';
xlScript.onload=function(){ window.XLSX_LIB=window.XLSX; };
document.head.appendChild(xlScript);

// 시작
renderHome();
</script>
